services:
  postgres_db:
    image: postgres:15-alpine
    container_name: resumefriendly_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resumefriendly_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SuperSecurePassword2026}
      POSTGRES_DB: ${POSTGRES_DB:-resumefriendly_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resumefriendly_admin} -d ${POSTGRES_DB:-resumefriendly_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  chroma_db:
    image: chromadb/chroma:latest
    container_name: resumefriendly_chroma
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/data

  backend_api:
    build: ./backend
    container_name: resumefriendly_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-resumefriendly_admin}:${POSTGRES_PASSWORD_URL:-SuperSecurePassword2026}@postgres_db:5432/${POSTGRES_DB:-resumefriendly_db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-b89e9005f32a514d33a6ea2d5e7ef3a31c5520a45b84c8a24bd6436f54dbf9ee}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - CHROMADB_HOST=chroma_db
      - CHROMADB_PORT=8000
      - UPLOAD_DIR=/workspace/uploads
    volumes:
      - uploads_data:/workspace/uploads
    depends_on:
      postgres_db:
        condition: service_healthy
      chroma_db:
        condition: service_started

  frontend_app:
    build: ./frontend
    container_name: resumefriendly_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend_api

volumes:
  pgdata:
  chromadata:
  uploads_data:
