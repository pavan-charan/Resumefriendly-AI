name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write

jobs:
  docker-publish:
    name: Build and Publish Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize repository owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/resumefriendly-ai-backend:latest
            ghcr.io/${{ env.OWNER_LC }}/resumefriendly-ai-backend:${{ github.sha }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/resumefriendly-ai-frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/resumefriendly-ai-frontend:${{ github.sha }}

      - name: Trigger deployment webhook
        if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
        run: curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}"
